# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=TEA4LIFE-USER-SERVICE
spring.threads.virtual.enabled=true
server.port=8080
# ===============================================================
# INFRASTRUCTURE & DATA
# ===============================================================
## SQL
spring.datasource.url=jdbc:mariadb://${DATASOURCE_URL}/tea4life-user-service-db
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
## Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.client-type=lettuce
spring.data.redis.repositories.enabled=false
### Data ID Generator
snowflake.worker-id=${SNOWFLAKE_WORKER_ID}
snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID}
### Kafka
# Settings
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVER}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Topic
spring.kafka.topic.storage-delete-file=${STORAGE_DELETE_FILE_TOPIC:storage-delete-file-topic}
spring.kafka.topic.user-registration=${USER_REGISTRATION_TOPIC:user-registration}
### Eureka
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
spring.cloud.discovery.enabled=${EUREKA_DISCOVERY_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_SERVICE_URL:}
eureka.instance.prefer-ip-address=${EUREKA_SERVICE_PREFER_IP_ADDRESS:false}
### Keycloak
keycloak.server-url=${KEYCLOAK_SERVER_URL}
keycloak.admin.user-name=${KEYCLOAK_ADMIN_USER_NAME}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}
keycloak.realm-master=master
keycloak.current-realm=Tea4Life
keycloak.client-id=admin-cli
### Service URLs
service.url.storage=${STORAGE_SERVICE_URL}
# ===============================================================
# OBSERVABILITY (LOGS & HEALTH)
# ===============================================================
## Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.status.http-mapping.UP=200
management.endpoint.health.status.http-mapping.DOWN=503
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
## Logging
logging.level.root=INFO
logging.level.me.huynhducphu=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
## Dev Tools
SPRING_DEVTOOLS_ADD_PROPERTIES=false
SPRING_DEVTOOLS_RESTART_ENABLED=false
SPRING_DEVTOOLS_LIVERELOAD_ENABLED=false
# ===============================================================
# WEB / MVC CONFIGURATION
# ===============================================================
## Swagger / Docs
springdoc.api-docs.enabled=false
springdoc.api-docs.version=openapi_3_0
springdoc.swagger-ui.enabled=false
## Pagination
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.max-page-size=20
## File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
## JSON Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
